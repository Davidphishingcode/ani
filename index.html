<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Story Cinematic</title>

<style>
body { margin:0; overflow:hidden; background:black; }

/* 🔐 password */
#lockScreen{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 background:black;
 color:white;
 z-index:10;
}
input{padding:10px;font-size:20px;}
button{padding:10px 20px;margin-top:10px;font-size:18px;}

/* 💖 text */
#text{
 position:absolute;
 top:40%;
 width:100%;
 text-align:center;
 font-size:40px;
 color:red;
 display:none;
}

/* 📸 end */
#photoEnd{
 position:absolute;
 width:100%;
 height:100%;
 display:none;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 background:black;
}
#photoEnd img{max-width:80%;border-radius:20px;}
#photoEnd h1{color:red;font-size:40px;}
</style>
</head>

<body>

<!-- 🔐 PASSWORD -->
<div id="lockScreen">
<h1>Enter Password 💖</h1>
<input id="pass" type="password">
<button onclick="unlock()">Enter</button>
</div>

<canvas id="scene"></canvas>

<div id="text">
I love you so much ❤️<br>
My love 💖<br>
You are my happiness forever 🌹
</div>

<div id="photoEnd">
<img src="your-photo.jpg">
<h1>I love you so much ❤️ My love 💖</h1>
</div>

<audio id="music" src="your-music.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let started=false;

function unlock(){
 if(document.getElementById("pass").value==="2531"){
  document.getElementById("lockScreen").style.display="none";
  started=true;
  document.getElementById("music").play().catch(()=>{});
 } else {
  alert("Wrong password ❌");
 }
}

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("scene")});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

camera.position.z=8;

// light
const light=new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

// 🌳 tree
const tree=new THREE.Mesh(
 new THREE.CylinderGeometry(0.2,0.2,2),
 new THREE.MeshBasicMaterial({color:0x8B4513})
);
tree.position.x=-2;
scene.add(tree);

// 👦 boy
const boy=new THREE.Mesh(
 new THREE.PlaneGeometry(1.5,2.5),
 new THREE.MeshBasicMaterial({map:new THREE.TextureLoader().load("boy.png"),transparent:true})
);
boy.position.set(-2,-1,0);
scene.add(boy);

// 👧 girl
const girl=new THREE.Mesh(
 new THREE.PlaneGeometry(1.5,2.5),
 new THREE.MeshBasicMaterial({map:new THREE.TextureLoader().load("girl.png"),transparent:true})
);
girl.position.set(4,-1,0);
scene.add(girl);

// ❤️ heart
const heart=new THREE.Mesh(
 new THREE.SphereGeometry(0.3),
 new THREE.MeshBasicMaterial({color:0xff0000})
);
heart.visible=false;
scene.add(heart);

// ✨ sparkles
let sparkles=[];
for(let i=0;i<60;i++){
 let s=new THREE.Mesh(
  new THREE.SphereGeometry(0.05),
  new THREE.MeshBasicMaterial({color:0xffffff,transparent:true})
 );
 s.position.set(Math.random()*10-5,Math.random()*6-3,0);
 scene.add(s);
 sparkles.push(s);
}

// 💋 kiss particles
let particles=[];
function heartParticle(x,y){
 let p=new THREE.Mesh(
  new THREE.SphereGeometry(0.05),
  new THREE.MeshBasicMaterial({color:0xff69b4})
 );
 p.position.set(x,y,0);
 scene.add(p);
 particles.push(p);
}

let step=0;

function animate(){
requestAnimationFrame(animate);
if(!started) return;

// ✨ sparkles
sparkles.forEach(s=>{
 s.position.y+=0.01;
 s.material.opacity=Math.abs(Math.sin(step*0.05));
 if(s.position.y>3) s.position.y=-3;
});

// 👧 walk
if(step<200) girl.position.x-=0.02;

// ❤️ give heart
if(step===200){
 heart.visible=true;
 heart.position.set(boy.position.x,boy.position.y+1,0);
}

// 💓 glow
if(step>200 && step<260){
 boy.material.color.setRGB(1,0.5+Math.sin(step*0.1)*0.5,0.5);
}

// 🤗 hug
if(step>260 && step<350){
 boy.position.x+=0.01;
 girl.position.x-=0.005;
}

// 😘 kiss
if(step>350 && step<450){
 boy.position.x+=0.01;
 girl.position.x-=0.01;

 if(step%5===0){
  heartParticle((boy.position.x+girl.position.x)/2,boy.position.y+1);
 }
}

// 💫 particles move
particles.forEach((p,i)=>{
 p.position.y+=0.02;
 p.scale.x+=0.01;
 p.scale.y+=0.01;
 if(p.position.y>3){
  scene.remove(p);
  particles.splice(i,1);
 }
});

// 🪑 sit
if(step>450 && step<550){
 boy.position.y-=0.01;
 girl.position.y-=0.01;
}

// 💖 text
if(step===550){
 document.getElementById("text").style.display="block";
}

// 📸 end
if(step===750){
 document.getElementById("photoEnd").style.display="flex";
}

// 🎬 CINEMATIC CAMERA
if(step<150){
 camera.position.x=-2;
 camera.position.z-=0.01;
}
else if(step<250){
 camera.position.x+=0.01;
}
else if(step<350){
 camera.position.x+=( (boy.position.x+girl.position.x)/2 - camera.position.x )*0.05;
 camera.position.z=5;
}
else if(step<450){
 camera.position.x=(boy.position.x+girl.position.x)/2;
 camera.position.z=3;
}
else if(step<650){
 camera.position.z+=0.01;
}
else{
 camera.position.z+=0.02;
}

// 👀 always look at center
camera.lookAt(
 (boy.position.x+girl.position.x)/2,
 0,
 0
);

step++;
renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
